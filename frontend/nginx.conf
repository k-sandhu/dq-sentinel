# Included at http level (conf.d), so map{} is allowed here.
# Pass WebSocket upgrades through to the backend (assistant chat),
# keep plain keepalive semantics for normal API requests.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to the backend container (HTTP + WebSocket)
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;  # profiling / RCA / chat turns can take a while
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
