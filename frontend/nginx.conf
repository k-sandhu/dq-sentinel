# Included at http level (conf.d), so map{} is allowed here.
# Pass WebSocket upgrades through to the backend (assistant chat),
# keep plain keepalive semantics for normal API requests.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets never change under the same name — let
    # browsers keep them for a year and skip revalidation entirely.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback. index.html (served for every app route) must NEVER be
    # cached without revalidation: a cached copy keeps referencing old hashed
    # bundles after a deploy, so users run a stale app until a hard reload
    # (observed during the 2026-07 UX benchmark after an image rebuild).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # API proxy to the backend container (HTTP + WebSocket)
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;  # profiling / RCA / chat turns can take a while
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;  # tiny responses cost more to compress than to send
    gzip_vary on;          # correct proxy caching for mixed-encoding clients
}
