# Alembic config for the DQ Sentinel app-metadata DB (issue #23).
# The database URL is NOT stored here — it is injected at runtime from
# app settings (env var DQ_DATABASE_URL) by migrations/env.py and by
# app.db.init_db(). Never hardcode a URL in this file.

[alembic]
# %(here)s = directory containing this file (backend/), so this resolves
# correctly whether alembic runs via CLI or in-process from init_db().
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os

# Logging is intentionally minimal and env.py does NOT call fileConfig():
# the application owns logging (app/observability.py) and alembic runs
# in-process at startup, so we must not clobber the app's handlers.
[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
