<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sentinel IM - Investment Operations Prototype</title>
  <style>
    :root {
      --brand: #509ee3;
      --brand-dark: #2f72ab;
      --brand-light: #cbe2f7;
      --bg: #f9fbfc;
      --card: #ffffff;
      --border: #e3e7e9;
      --border-light: #eef0f2;
      --text: #4c5773;
      --text-dark: #2e353b;
      --text-light: #949aab;
      --ok: #84bb4c;
      --warn: #f2a86f;
      --warn-strong: #e8a541;
      --danger: #ed6e6e;
      --danger-dark: #d14e4e;
      --purple: #a989c5;
      --shadow: 0 1px 3px rgba(46, 53, 59, 0.06), 0 2px 8px rgba(46, 53, 59, 0.04);
      --radius: 8px;
      --mono: ui-monospace, "Cascadia Code", "Segoe UI Mono", Menlo, monospace;
      --card2: #fbfcfd;
      --hover: #f5f9fd;
      --hover-soft: #f7fbff;
      --input-bg: #ffffff;
      --inverse-bg: #2e353b;
      --topbar-bg: rgba(249, 251, 252, 0.94);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --brand: #5ba3e8;
      --brand-dark: #84bdf0;
      --brand-light: #1f3a52;
      --bg: #14181d;
      --card: #1c2229;
      --card2: #181e24;
      --border: #2b333d;
      --border-light: #242b33;
      --text: #aeb8c4;
      --text-dark: #e9edf2;
      --text-light: #717c8a;
      --hover: #202a34;
      --hover-soft: #1e2832;
      --input-bg: #161b21;
      --inverse-bg: #0d1115;
      --topbar-bg: rgba(20, 24, 29, 0.92);
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    html[data-theme="dark"] .pill.pass, html[data-theme="dark"] .pill.resolved, html[data-theme="dark"] .pill.active, html[data-theme="dark"] .pill.complete, html[data-theme="dark"] .pill.approved { background: rgba(132, 187, 76, 0.16); color: #a3d573; }
    html[data-theme="dark"] .pill.warn, html[data-theme="dark"] .pill.acknowledged, html[data-theme="dark"] .pill.sev2 { background: rgba(242, 168, 111, 0.16); color: #ecb277; }
    html[data-theme="dark"] .pill.fail, html[data-theme="dark"] .pill.error, html[data-theme="dark"] .pill.open, html[data-theme="dark"] .pill.failed, html[data-theme="dark"] .pill.sev1 { background: rgba(237, 110, 110, 0.16); color: #f09090; }
    html[data-theme="dark"] .pill.expected, html[data-theme="dark"] .pill.running, html[data-theme="dark"] .pill.sev3, html[data-theme="dark"] .pill.monitoring { background: rgba(80, 158, 227, 0.18); color: #8ec3ee; }
    html[data-theme="dark"] .pill.proposed, html[data-theme="dark"] .pill.review { background: rgba(169, 137, 197, 0.2); color: #c5abdf; }
    html[data-theme="dark"] .pill.unknown, html[data-theme="dark"] .pill.muted, html[data-theme="dark"] .pill.disabled, html[data-theme="dark"] .pill.archived, html[data-theme="dark"] .pill.dismissed { background: rgba(255, 255, 255, 0.07); color: var(--text-light); }
    html[data-theme="dark"] .badge.ai { background: #2a2138; border-color: #473560; color: #c5abdf; }
    html[data-theme="dark"] .heat-cell.ok { background: rgba(132, 187, 76, 0.14); color: #a3d573; }
    html[data-theme="dark"] .heat-cell.warn { background: rgba(242, 168, 111, 0.14); color: #ecb277; }
    html[data-theme="dark"] .heat-cell.fail { background: rgba(237, 110, 110, 0.14); color: #f09090; }
    html[data-theme="dark"] .info-box { background: #152638; border-color: #234763; color: #8ec3ee; }
    html[data-theme="dark"] .error-box { background: #331c1c; border-color: #5a2e2e; color: #f09090; }
    html[data-theme="dark"] .map-node.fail { border-color: #5a2e2e; background: #241a1a; }
    html[data-theme="dark"] .map-node.warn { border-color: #5a4527; background: #241f17; }
    html[data-theme="dark"] .step.on { background: #1a2733; }
    html[data-theme="dark"] .step.done { border-color: #3a5230; background: #1c2418; color: #a3d573; }
    html[data-theme="dark"] .score-chip { background: rgba(237, 110, 110, 0.16); color: #f09090; }
    html[data-theme="dark"] .env-dot { box-shadow: 0 0 0 3px rgba(132, 187, 76, 0.15); }
    html[data-theme="dark"] .dense-item.clickable:hover { border-color: #2c4a66; }
    html[data-theme="dark"] .timeline-item.fail .timeline-dot { box-shadow: 0 0 0 1px #5a2e2e; }
    html[data-theme="dark"] .timeline-item.warn .timeline-dot { box-shadow: 0 0 0 1px #5a4527; }

    * { box-sizing: border-box; }
    html, body, #app { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1, h2, h3, h4 { color: var(--text-dark); margin: 0; font-weight: 700; }
    code, pre { font-family: var(--mono); font-size: 12.5px; }

    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 220px;
      flex: none;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 14px 10px;
      overflow-y: auto;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 10px 16px;
      font-size: 17px;
      font-weight: 800;
      color: var(--text-dark);
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--brand);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex: none;
    }
    .nav-section {
      margin-top: 14px;
      padding: 0 10px 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.7px;
      color: var(--text-light);
      text-transform: uppercase;
    }
    .nav-group { margin-top: 10px; }
    .nav-group:first-of-type { margin-top: 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--bg); text-decoration: none; }
    .nav-item.active { background: var(--brand); color: #fff; }
    .nav-item.active svg { stroke: #fff; }
    .nav-item svg { stroke: var(--text-light); flex: none; }
    .sidebar .spacer { flex: 1; }
    .user-box {
      border-top: 1px solid var(--border-light);
      padding: 10px 10px 2px;
      font-size: 12.5px;
    }
    .user-box .email {
      color: var(--text-dark);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main { flex: 1; overflow-y: auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      height: 56px;
      background: var(--topbar-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 32px;
    }
    .environment-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-dark);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .env-dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--ok);
      box-shadow: 0 0 0 3px #eaf4df;
    }
    .global-search {
      flex: 1;
      max-width: 620px;
      position: relative;
    }
    .global-search input {
      margin-top: 0;
      padding-left: 34px;
      background: var(--input-bg);
    }
    .global-search svg {
      position: absolute;
      left: 10px;
      top: 8px;
      color: var(--text-light);
    }
    .topbar-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notification-dot {
      min-width: 18px;
      height: 18px;
      border-radius: 99px;
      background: var(--danger);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      padding: 0 5px;
    }
    .page { padding: 26px 32px 60px; max-width: 1280px; margin: 0 auto; }
    .page.wide { max-width: 1500px; }
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .page-header h1 { font-size: 22px; }
    .page-header .sub { color: var(--text-light); margin-top: 4px; font-size: 13px; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .card-pad { padding: 18px 20px; }
    .card h3 { font-size: 14px; margin-bottom: 12px; }
    .grid { display: grid; gap: 16px; }
    .grid > *, .split > * { min-width: 0; }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.cols-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .grid.cols-6 { grid-template-columns: repeat(6, minmax(0, 1fr)); }
    @media (max-width: 1100px) {
      .grid.cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.cols-5, .grid.cols-6 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.cols-3, .grid.cols-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 820px) {
      .app { display: block; height: auto; min-height: 100%; overflow: visible; }
      .sidebar { width: 100%; position: sticky; top: 0; z-index: 20; border-bottom: 1px solid var(--border); border-right: 0; }
      .sidebar nav { display: flex; overflow-x: auto; gap: 3px; }
      .sidebar .spacer, .user-box, .nav-section { display: none; }
      .nav-item { white-space: nowrap; }
      .topbar { position: relative; height: auto; padding: 10px 14px; flex-wrap: wrap; }
      .global-search { order: 3; flex-basis: 100%; max-width: none; }
      .page { padding: 18px 14px 40px; }
    }

    .stat-card { padding: 16px 18px; }
    .stat-card .label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-dark);
      margin-top: 6px;
    }
    .stat-card .value.danger { color: var(--danger-dark); }
    .stat-card .value.ok { color: var(--ok); }
    .stat-card .hint { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .metric-row { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
    .metric-row .big {
      color: var(--text-dark);
      font-weight: 800;
      font-size: 24px;
      font-variant-numeric: tabular-nums;
    }
    .metric-row .delta { font-size: 12px; font-weight: 700; }
    .delta.good { color: var(--ok); }
    .delta.bad { color: var(--danger-dark); }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0 12px;
    }
    .section-title h2 {
      font-size: 16px;
      color: var(--text-dark);
    }
    .split {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
      gap: 16px;
      align-items: start;
    }
    .split.even { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    @media (max-width: 1050px) { .split, .split.even { grid-template-columns: 1fr; } }
    .dense-list { display: grid; gap: 8px; }
    .dense-item {
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--card);
    }
    .dense-item.clickable { cursor: pointer; }
    .dense-item.clickable:hover { border-color: var(--brand-light); background: var(--hover-soft); }
    .dense-item .title { font-weight: 700; color: var(--text-dark); }
    .dense-item .meta { color: var(--text-light); font-size: 12px; margin-top: 2px; }
    .dense-item .meta, .domain-card .meta, .map-node .meta, .contract-item .meta { overflow-wrap: anywhere; }
    .heatmap {
      display: grid;
      grid-template-columns: 140px repeat(5, minmax(58px, 1fr));
      gap: 6px;
      align-items: stretch;
      font-size: 12px;
    }
    .heatmap .head {
      color: var(--text-light);
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 6px 4px;
    }
    .heatmap .row-label {
      color: var(--text-dark);
      font-weight: 700;
      padding: 8px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .heat-cell {
      border-radius: 5px;
      padding: 7px 8px;
      text-align: center;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      border: 1px solid transparent;
    }
    .heat-cell.ok { background: #eaf4df; color: #5d9230; }
    .heat-cell.warn { background: #fdf0e3; color: #c07f2b; }
    .heat-cell.fail { background: #fde9e9; color: #c4403f; }
    .heat-cell.neutral { background: var(--bg); color: var(--text-light); border-color: var(--border-light); }
    .timeline { display: grid; gap: 0; }
    .timeline-item {
      position: relative;
      padding: 0 0 14px 22px;
      border-left: 2px solid var(--border-light);
      margin-left: 6px;
    }
    .timeline-item:last-child { border-left-color: transparent; padding-bottom: 0; }
    .timeline-dot {
      position: absolute;
      left: -6px;
      top: 2px;
      width: 10px;
      height: 10px;
      border-radius: 99px;
      background: var(--brand);
      border: 2px solid var(--card);
      box-shadow: 0 0 0 1px var(--brand-light);
    }
    .timeline-item.fail .timeline-dot { background: var(--danger); box-shadow: 0 0 0 1px #f5c6c6; }
    .timeline-item.warn .timeline-dot { background: var(--warn-strong); box-shadow: 0 0 0 1px #f7d6ad; }
    .score-ring {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: conic-gradient(var(--ok) calc(var(--score) * 1%), var(--border-light) 0);
      position: relative;
      flex: none;
    }
    .score-ring::after {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 50%;
      background: var(--card);
    }
    .score-ring strong {
      position: relative;
      z-index: 1;
      color: var(--text-dark);
      font-size: 20px;
    }
    .domain-card {
      display: grid;
      gap: 10px;
      padding: 14px;
    }
    .domain-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .domain-title { color: var(--text-dark); font-weight: 800; }
    .progress-line {
      height: 7px;
      border-radius: 99px;
      background: var(--border-light);
      overflow: hidden;
    }
    .progress-line > div {
      height: 100%;
      border-radius: inherit;
      background: var(--brand);
    }
    .progress-line.fail > div { background: var(--danger); }
    .progress-line.warn > div { background: var(--warn-strong); }
    .quality-map {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .map-node {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--card);
      min-height: 78px;
    }
    .map-node .name { font-weight: 800; color: var(--text-dark); }
    .map-node .meta { color: var(--text-light); font-size: 11.5px; margin-top: 3px; }
    .map-node.fail { border-color: #f5c6c6; background: #fff8f8; }
    .map-node.warn { border-color: #f7d6ad; background: #fffaf4; }
    .stepper {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .step {
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 10px;
      background: var(--card);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
    }
    .step.on { border-color: var(--brand); color: var(--brand-dark); background: #f4f9fd; }
    .step.done { border-color: #cfe4bd; color: #5d9230; background: #f8fcf4; }
    .contract-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .contract-item {
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 12px;
      background: var(--card);
    }
    .contract-item strong { color: var(--text-dark); }
    .contract-item .label { color: var(--text-light); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4px; }
    @media (max-width: 820px) {
      .heatmap { grid-template-columns: 110px repeat(5, minmax(46px, 1fr)); overflow-x: auto; }
      .quality-map, .contract-grid { grid-template-columns: 1fr; }
      .stepper { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 520px) {
      .grid.cols-4, .grid.cols-5, .grid.cols-6 { grid-template-columns: 1fr; }
      .domain-head { align-items: flex-start; }
      .chart-bars, .panel-bars { overflow-x: auto; padding-bottom: 4px; }
      .day-bar { min-width: 28px; }
    }

    .table-wrap { overflow-x: auto; }
    table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.data th {
      text-align: left;
      padding: 10px 12px;
      color: var(--text-light);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      background: var(--card2);
    }
    table.data td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }
    table.data tr:last-child td { border-bottom: none; }
    table.data tr.clickable { cursor: pointer; }
    table.data tr.clickable:hover td { background: var(--hover); }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.mono, .mono { font-family: var(--mono); font-size: 12px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2.5px 9px;
      border-radius: 99px;
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
    }
    .pill.pass { background: #eaf4df; color: #5d9230; }
    .pill.warn { background: #fdf0e3; color: #c07f2b; }
    .pill.fail { background: #fde9e9; color: #c4403f; }
    .pill.error { background: #f7dcdc; color: #a33; }
    .pill.unknown, .pill.muted { background: #f0f2f4; color: var(--text-light); }
    .pill.open { background: #fde9e9; color: #c4403f; }
    .pill.acknowledged { background: #fdf0e3; color: #c07f2b; }
    .pill.expected { background: #e9f0fb; color: var(--brand-dark); }
    .pill.resolved { background: #eaf4df; color: #5d9230; }
    .pill.proposed { background: #f1eaf8; color: #7d5da3; }
    .pill.active { background: #eaf4df; color: #5d9230; }
    .pill.disabled, .pill.archived { background: #f0f2f4; color: var(--text-light); }
    .pill.running { background: #e9f0fb; color: var(--brand-dark); }
    .pill.complete { background: #eaf4df; color: #5d9230; }
    .pill.failed { background: #fde9e9; color: #c4403f; }
    .pill.sev1 { background: #fde9e9; color: #c4403f; }
    .pill.sev2 { background: #fdf0e3; color: #c07f2b; }
    .pill.sev3 { background: #e9f0fb; color: var(--brand-dark); }
    .pill.monitoring { background: #e9f0fb; color: var(--brand-dark); }
    .pill.review { background: #f1eaf8; color: #7d5da3; }
    .pill.approved { background: #eaf4df; color: #5d9230; }
    .pill.dismissed { background: #f0f2f4; color: var(--text-light); }
    .badge {
      display: inline-block;
      padding: 1.5px 7px;
      border-radius: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
    }
    .badge.ai { background: #f1eaf8; border-color: #e0d2ef; color: #7d5da3; }
    .badge.kind { font-family: var(--mono); font-size: 10.5px; }
    .sev {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 99px;

    function icon(name, size = 16) {
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${svgPaths[name] || '<circle cx="12" cy="12" r="8"/>'}</svg>`;

        .replaceAll("<", "&lt;")

        .replaceAll('"', "&quot;")

    };
    document.documentElement.dataset.theme = state.theme;

    const data = {

    function renderSearchResults() {
      const q = state.globalSearch.toLowerCase().trim();
      if (!q) return "";
      const clientHits = data.clients
        .filter(c => `${c.name} ${c.type} ${c.custodian} ${c.csm}`.toLowerCase().includes(q))
        .slice(0, 4)
        .map(c => ({ title: c.name, meta: `${c.type} - ${c.aum} - ${c.custodian}`, route: `/clients/${c.id}/overview`, kind: "client" }));
      const incidentHits = data.incidents
        .filter(i => `${i.id} ${i.title} ${i.owner} ${i.scope}`.toLowerCase().includes(q))
        .slice(0, 4)
        .map(i => ({ title: `${i.id} ${i.title}`, meta: `${i.status} - ${i.owner} - ${i.scope}`, route: "/incidents", kind: "incident", id: i.id }));
      const mandateHits = data.mandates
        .filter(m => `${m.strategy} ${m.client} ${m.benchmark}`.toLowerCase().includes(q))
        .slice(0, 4)
        .map(m => ({ title: `${m.client} - ${m.strategy}`, meta: `${m.vehicle} - ${m.benchmark} - ${m.aum}`, route: "/mandates", kind: "mandate" }));
      const feedHits = data.feeds
        .filter(f => `${f.vendor} ${f.name} ${f.kind}`.toLowerCase().includes(q))
        .slice(0, 3)
        .map(f => ({ title: `${f.vendor} - ${f.name}`, meta: `${f.kind} - SLA ${f.sla} - ${f.status}`, route: "/feeds", kind: "feed" }));
      const hits = [...incidentHits, ...clientHits, ...mandateHits, ...feedHits].slice(0, 9);
      return `<div class="page" style="padding-bottom:0">
        <div class="card card-pad" style="margin-bottom:0">
          <div class="section-title" style="margin:0 0 10px"><h2>Search results for "${escapeHtml(state.globalSearch)}"</h2><button class="small" data-action="clear-search">Clear</button></div>
          ${hits.length ? `<div class="dense-list">${hits.map(h => `<div class="dense-item clickable" data-route="${h.route}" ${h.id ? `data-incident-id="${h.id}"` : ""}><div class="title">${badge(h.kind)} ${escapeHtml(h.title)}</div><div class="meta">${escapeHtml(h.meta)}</div></div>`).join("")}</div>` : empty("No matching records", "Try a client, custodian, incident id, or vendor name.")}

    }

    function stat(label, value, hint = "", tone = "") {
      return `<div class="card stat-card"><div class="label">${label}</div><div class="value ${tone}">${value}</div>${hint ? `<div class="hint">${hint}</div>` : ""}</div>`;
    }
    function pageHeader(title, sub, actions = "") {
      return `<div class="page-header"><div><h1>${title}</h1>${sub ? `<div class="sub">${sub}</div>` : ""}</div>${actions ? `<div class="header-actions">${actions}</div>` : ""}</div>`;
    }
    function empty(title, hint = "", action = "") {
      return `<div class="empty"><div class="big">${title}</div>${hint ? `<div>${hint}</div>` : ""}${action ? `<div style="margin-top:14px">${action}</div>` : ""}</div>`;
    }
    function timeline(items) {
      return `<div class="timeline">${items.map(([tone, title, body, time]) => `<div class="timeline-item ${tone}"><span class="timeline-dot"></span><div class="title">${title}</div><div class="meta">${body}</div><div style="font-size:11px;color:var(--text-light);margin-top:3px">${time}</div></div>`).join("")}</div>`;
    }

            <polyline fill="none" stroke="#509ee3" stroke-width="3" points="0,53 20,66 40,53 60,79 80,66 100,79 120,92 140,79 160,92 180,105 200,92 220,105 240,114 260,118"/>
            <polyline fill="none" stroke="#509ee3" stroke-width="2.5" stroke-dasharray="6 5" points="260,118 300,126 340,135 380,144 400,149"/>

    }
    function agentFeed() {
      return `<div class="dense-list">${data.agentEvents.slice(0, 6).map(([agent, what, when, route]) => `
        <div class="dense-item clickable" data-route="${route}">
          <div class="title">${badge(agent, "ai")} <span style="font-weight:600">${what}</span></div>

    }
    function riskHeatmap() {
      const columns = ["Prices", "Recon", "IPS", "Perf", "CorpAct"];
      const values = {
        "Helios": [["warn", 0], ["fail", 3], ["ok", 0], ["ok", 0], ["ok", 0]],
        "Meridian": [["fail", 47], ["ok", 0], ["warn", 2], ["warn", 1], ["ok", 0]],
        "Pacifica": [["warn", 3], ["warn", 1], ["ok", 0], ["ok", 0], ["ok", 0]],
        "Atlas": [["ok", 0], ["warn", 1], ["fail", 1], ["ok", 0], ["ok", 0]],
        "Keystone": [["ok", 0], ["ok", 0], ["ok", 0], ["fail", 1], ["ok", 0]]
      };
      return `<div class="heatmap"><div></div>${columns.map(c => `<div class="head">${c}</div>`).join("")}${Object.entries(values).map(([client, cells]) => `<div class="row-label">${client}</div>${cells.map(([tone, n]) => `<div class="heat-cell ${tone}">${n}</div>`).join("")}`).join("")}</div>`;
    }
    function flowMap() {
      return `<div class="quality-map">${data.flow.map(n => `<div class="map-node ${n.health}"><div class="name">${n.name}</div><div class="meta">${n.meta}</div></div>`).join("")}</div>`;
    }
    function clientById(id) {
      return data.clients.find(c => c.id === Number(id)) || data.clients[0];
    }

    function renderHome() {
      const openExceptions = data.exceptions.filter(e => e.status === "open").length;
      const feedsOk = data.feeds.filter(f => f.status === "pass").length;
      const activeIncidents = data.incidents.filter(i => i.status !== "resolved").length;
      const trend = [
        ["05-28", 41, 2, 0], ["05-29", 42, 1, 0], ["05-30", 41, 2, 1], ["05-31", 40, 3, 1],
        ["06-01", 43, 2, 1], ["06-02", 44, 1, 0], ["06-03", 42, 2, 0], ["06-04", 43, 2, 1],
        ["06-05", 44, 1, 0], ["06-06", 42, 3, 1], ["06-07", 43, 2, 0], ["06-08", 44, 1, 1],
        ["06-09", 41, 4, 1], ["06-10", 36, 5, 3]
      ];
      return appShell(`
        <div class="page">
          ${pageHeader(
            "Investment data control tower",
            `${state.llm ? badge("AI operations enabled", "ai") : badge("heuristic mode")} ${badge("10 clients")} ${badge("$43.5B monitored")} ${badge("5 custodians")} ${badge("T+0 cycle 02:00-11:30")}`,

            ${stat("Data confidence", `${data.kpis.confidence}`, "weighted across NAV-critical domains", data.kpis.confidence < 95 ? "danger" : "ok")}
            ${stat("NAV strikes held", `${data.kpis.strikesHeld}`, "Meridian GA + EM Debt Pool", data.kpis.strikesHeld ? "danger" : "ok")}
            ${stat("Feeds on SLA", `${feedsOk}/${data.feeds.length}`, "Bloomberg DL + State Street degraded", feedsOk < data.feeds.length ? "danger" : "ok")}
            ${stat("Recon matched", "99.6%", "MV-weighted across custodians")}
            ${stat("Open exceptions", fmt(openExceptions), "NAV-impacting first", openExceptions ? "danger" : "ok")}

          <div class="split" style="margin-bottom:16px">
            <div class="card card-pad">
              <div class="section-title" style="margin:0 0 12px"><h2>Morning data cycle - last 14 days</h2><button class="small" data-route="/checks">${icon("shield", 12)} Checks</button></div>
              <div class="chart-bars">
                ${trend.map(([day, passed, warned, failed]) => {
                  const total = passed + warned + failed;
                  return `<div class="day-bar" title="${day}: ${passed} passed, ${warned} warned, ${failed} failed">
                    <div class="stack">
                      <div class="seg pass" style="height:${passed / total * 100}%"></div>
                      <div class="seg warn" style="height:${warned / total * 100}%"></div>
                      <div class="seg fail" style="height:${failed / total * 100}%"></div>

            </div>
            <div class="card card-pad">
              <div class="section-title" style="margin:0 0 12px"><h2>Action queue</h2><button class="small" data-route="/ai-review">${icon("bolt", 12)} AI review</button></div>
              <div class="dense-list">
                ${data.incidents.filter(i => i.status !== "resolved").map(i => `
                  <div class="dense-item clickable" data-modal="incident" data-id="${i.id}">
                    <div class="title">${pill(i.severity)} ${escapeHtml(i.title)}</div>
                    <div class="meta">${i.id} - ${i.owner} - ${i.age} - ${i.scope}</div>
                    <div class="progress-line ${i.severity === "sev1" ? "fail" : "warn"}" style="margin-top:8px"><div style="width:${i.progress}%"></div></div>

          <div class="split even" style="margin-bottom:16px">
            <div class="card card-pad">
              <div class="section-title" style="margin:0 0 12px"><h2>Reporting-cutoff forecast</h2><span class="badge ai">AI projection</span></div>
              ${forecastChart()}
            </div>
            <div class="card card-pad">
              <div class="section-title" style="margin:0 0 12px"><h2>Autonomous agent activity</h2><span style="display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--ok)"><span class="live-dot"></span> live</span></div>
              ${agentFeed()}
            </div>
          </div>

          <div class="split even" style="margin-bottom:16px">
            <div class="card card-pad">
              <div class="section-title" style="margin:0 0 12px"><h2>Exception pressure by client</h2><span class="badge">top 5 by AUM at risk</span></div>
              ${riskHeatmap()}
            </div>
            <div class="card card-pad">
              <div class="section-title" style="margin:0 0 12px"><h2>Data flow health</h2><span class="badge">vendors to client reporting</span></div>
              ${flowMap()}
            </div>
          </div>

          <div class="split" style="margin-bottom:16px">
            <div class="card card-pad">
              <div class="section-title" style="margin:0 0 12px"><h2>Clients needing attention</h2><button class="small" data-route="/clients">All clients</button></div>
              <div class="dense-list">
                ${data.clients.filter(c => c.health !== "pass").map(c => `
                  <div class="dense-item clickable" data-route="/clients/${c.id}/overview">
                    <div style="display:flex;justify-content:space-between;gap:10px"><div><div class="title">${c.name}</div><div class="meta">${c.type} - ${c.aum} - ${c.custodian}</div></div>${pill(c.health)}</div>
                    <div class="meta" style="margin-top:6px">${c.note}</div>
                  </div>`).join("")}
              </div>
            </div>
            <div class="card card-pad">
              <div class="section-title" style="margin:0 0 12px"><h2>This morning</h2><button class="small" data-route="/incidents">Incident board</button></div>
              ${timeline(data.morning)}
            </div>
          </div>
        </div>
      `, "/");
    }

    function renderIncidentsPage() {

          <div class="split">

                  <td>${pill(i.status)}</td><td>${pill(i.severity)}</td><td>${i.owner}</td><td class="num" style="font-weight:700;color:var(--danger-dark)">${fmt(i.exceptions)}</td><td>${i.age}</td>

            <div class="card card-pad">
              <h3>Incident lifecycle</h3>
              ${timeline([
                ["fail", "Detect", "feed SLAs, completeness, recon, and NAV controls fire automatically", "auto"],
                ["warn", "Contain", "strikes held, fallbacks engaged, downstream consumers flagged", "policy"],
                ["", "Investigate", "RCA agent runs guarded read-only SQL and attaches evidence", "AI"],
                ["", "Repair", "vendor tickets, refetches, and manual marks are tracked here", "owner"],
                ["", "Verify & release", "dual sign-off releases NAVs; incident enters monitoring", "controls"]
              ])}
            </div>
          </div>
        </div>
      `, "/incidents");
    }

    function renderClients() {
      const q = state.clientSearch.toLowerCase();
      const rows = data.clients.filter(c => `${c.name} ${c.type} ${c.custodian} ${c.csm}`.toLowerCase().includes(q));
      return appShell(`
        <div class="page wide">
          ${pageHeader("Clients", `${data.clients.length} institutional relationships - $43.5B under data monitoring`, `<input type="text" data-bind="clientSearch" placeholder="Search name, type, custodian..." value="${escapeHtml(state.clientSearch)}" style="margin-top:0;width:260px">`)}
          <div class="card table-wrap">
            <table class="data">
              <thead><tr><th>Health</th><th>Client</th><th>Type</th><th class="num">AUM</th><th>Custodian</th><th class="num">Mandates</th><th class="num">Pools</th><th>IPS</th><th class="num">Open exceptions</th><th>Next deliverable</th></tr></thead>
              <tbody>
                ${rows.map(c => `
                  <tr class="clickable" data-route="/clients/${c.id}/overview">
                    <td>${pill(c.health)}</td>
                    <td style="font-weight:700;color:var(--text-dark)">${c.name}</td>
                    <td style="color:var(--text-light)">${c.type}</td>
                    <td class="num" style="font-weight:700">${c.aum}</td>
                    <td>${badge(c.custodian)}</td>
                    <td class="num">${c.mandates}</td>
                    <td class="num">${c.pools}</td>
                    <td>${pill(c.ips)}</td>
                    <td class="num" style="${c.open ? "color:var(--danger-dark);font-weight:700" : ""}">${c.open}</td>

                  </tr>`).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `, "/clients");
    }

    function renderClientDetail(id, tab = "overview") {
      const c = clientById(id);
      const tabs = [["overview", "Overview"], ["mandates", "Mandates"], ["recon", "Recon"], ["exceptions", "Exceptions"]];
      let body = "";
      if (tab === "overview") body = clientOverview(c);
      if (tab === "mandates") body = clientMandates(c);
      if (tab === "recon") body = clientRecon(c);
      if (tab === "exceptions") body = renderExceptionsTriage(c.id);
      return appShell(`
        <div class="page">
          ${pageHeader(
            `${c.name} ${pill(c.health)}`,
            `${c.type} - ${c.aum} - custodian ${c.custodian} - client lead ${c.csm} - next deliverable: ${c.reportDue}`,
            `<button data-route="/recon">${icon("check", 13)} Recon</button><button data-action="toast" data-message="Client data pack export queued">${icon("book", 13)} Export data pack</button>`
          )}
          <div class="tabs">
            ${tabs.map(([key, label]) => `<button class="tab ${tab === key ? "on" : ""}" data-route="/clients/${c.id}/${key}">${label}${key === "exceptions" && c.open ? `<span class="count">${c.open}</span>` : ""}</button>`).join("")}
          </div>
          ${body}
        </div>
      `, "/clients");
    }
    function clientOverview(c) {
      const readiness = [
        ["Pricing", c.id === 2 ? "47 securities on T-1 fallback" : "all sources current", c.id === 2 ? "fail" : "pass"],
        ["Custody recon", c.custodian === "State Street" ? "completed late (08:31) - " + (c.id === 1 ? "3 breaks open" : "clean") : "clean, on time", c.custodian === "State Street" ? (c.id === 1 ? "fail" : "warn") : "pass"],
        ["IPS compliance", c.ips === "warn" ? "1 rule at band edge" : "all rules within bands", c.ips],

      return `
        ${c.note ? `<div class="info-box"><strong>Status:</strong> ${c.note}</div>` : ""}
        <div class="grid cols-4" style="margin-bottom:16px">
          ${stat("AUM", c.aum, `${c.mandates} mandates, ${c.pools} pool positions`)}
          ${stat("Open exceptions", c.open, c.open ? "triage in the Exceptions tab" : "all clear", c.open ? "danger" : "ok")}
          ${stat("IPS status", c.ips, c.ips === "warn" ? "see Mandates tab" : "all bands respected", c.ips === "warn" ? "danger" : "ok")}

        <div class="split">

              ${readiness.map(([field, actual, status]) => `<div class="contract-item"><div class="label">${field}</div><strong>${escapeHtml(actual)}</strong><div style="margin-top:9px">${pill(status)}</div></div>`).join("")}
            </div>
          </div>
          <div class="card card-pad">
            <h3>Recent activity</h3>
            ${timeline(c.id === 2 ? [
              ["fail", "NAV strike held", "fallback pricing exceeded 0.5% of MV - policy CTL-01", "06:12"],
              ["", "Fallback engaged", "ICE evaluated covering 41 of 47 gaps", "06:15"],
              ["warn", "Statutory close at risk", "cutoff 11:30 - refetch ETA 10:30", "forecast"],
              ["", "Client service briefed", "holding statement drafted by digest agent", "09:05"]

              ["fail", "Custody file late", "State Street landed 08:04 vs 06:00 SLA", "08:04"],
              ["", "Recon completed", "99.1% matched in 27 minutes", "08:31"],
              ["warn", "3 breaks open", "largest: FNMA pool paydown factor timing", "08:31"],
              ["", "Board pack data cut", "still achievable if breaks clear by 15:00", "forecast"]

              ["", "Morning cycle clean", "all feeds, recon, and IPS checks passed", "08:45"],
              ["", "Performance verified", "vendor returns match IBOR shadow", "06:35"]
            ])}
          </div>
        </div>`;
    }
    function clientMandates(c) {
      const rows = data.mandates.filter(m => m.clientId === c.id);
      return mandatesTable(rows, false);
    }
    function clientRecon(c) {
      const recon = data.recons.find(r => r.clientId === c.id);
      const breaks = data.breaks.filter(b => b.clientId === c.id);
      return `
        <div class="grid cols-4" style="margin-bottom:16px">
          ${stat("Positions matched", recon ? `${recon.positions}%` : "-", recon ? recon.custodian : "", recon && recon.positions < 100 ? "danger" : "ok")}
          ${stat("Cash breaks", recon ? recon.cashBreaks : "-", "", recon && recon.cashBreaks ? "danger" : "ok")}
          ${stat("MV difference", recon ? `${recon.mvDiffBps}bp` : "-", "absolute, vs custodian")}

              <td style="font-size:12px">${m.benchmark}</td>
              <td class="num" style="font-weight:700">${m.aum}</td>

      if (state.mandateFilter !== "all") rows = rows.filter(m => m.ips === state.mandateFilter);
      return appShell(`
        <div class="page wide">
          ${pageHeader("Mandates & IPS", `${data.mandates.length} mandates across separate accounts and pools - every IPS clause maps to a live check (CTL-04: ${data.policies.find(p => p.id === "CTL-04").compliance}% covered)`, `<button class="primary" data-action="toast" data-message="IPS re-evaluation queued for all mandates">${icon("check", 14)} Re-run IPS checks</button>`)}
          <div class="toolbar"><div class="chip-row">${["all", "warn", "pass"].map(f => `<button class="filter-chip ${state.mandateFilter === f ? "on" : ""}" data-action="mandate-filter" data-value="${f}">${f}</button>`).join("")}</div></div>
          ${mandatesTable(rows)}
        </div>
      `, "/mandates");
    }

    function renderPools() {

      if (!target) return;
      if (target.dataset.route) {
        routeTo(target.dataset.route);
        state.openModal = null;
        return;
      }
      if (target.dataset.modal) {
        state.openModal = target.dataset.modal;
        state.modalData = { id: target.dataset.id };
        render();
        return;
      }
      const action = target.dataset.action;
      if (action === "toast") toast(target.dataset.message || "Clicked");
      if (action === "clear-search") { state.globalSearch = ""; render(); }
      if (action === "close-modal" || action === "close-modal-bg") {
        if (action === "close-modal-bg" && event.target !== target) return;
        state.openModal = null; render();
      }
      if (action === "incident-filter") { state.incidentFilter = target.dataset.value; render(); }
      if (action === "feed-filter") { state.feedFilter = target.dataset.value; render(); }
      if (action === "check-filter") { state.checkFilter = target.dataset.value; render(); }
      if (action === "mandate-filter") { state.mandateFilter = target.dataset.value; render(); }
      if (action === "rebal-filter") { state.rebalFilter = target.dataset.value; render(); }
      if (action === "trade-filter") { state.tradeFilter = target.dataset.value; render(); }
      if (action === "governance-tab") { state.governanceTab = target.dataset.value; render(); }
      if (action === "ai-filter") { state.aiQueueFilter = target.dataset.value; render(); }
      if (action === "incident-resolve") {
        const incident = data.incidents.find(i => i.id === target.dataset.id);
        if (incident) {
          incident.status = "monitoring";
          incident.progress = Math.max(incident.progress, 85);
        }
        state.openModal = null;
        toast("Incident moved to monitoring");
        render();
      }
      if (action === "approve-rebalance") {
        const r = data.rebalances.find(x => x.id === target.dataset.id);
        if (r) r.status = "approved";
        state.openModal = null;
        toast("Rebalance approved - staged for execution");
        render();
      }
      if (action === "approve-ai") {
        const rec = data.recommendations.find(r => r.id === target.dataset.id);
        if (rec) rec.status = "approved";
        toast("Recommendation approved - control staged for rollout");
        render();
      }
      if (action === "dismiss-ai") {
        const rec = data.recommendations.find(r => r.id === target.dataset.id);
        if (rec) rec.status = "dismissed";
        toast("Recommendation dismissed");
        render();
      }
      if (action === "exception-filter") { state.exceptionFilter = target.dataset.value; state.selectedExceptions.clear(); render(); }
      if (action === "toggle-exception") {
        event.stopPropagation();
        const id = Number(target.dataset.id);
        if (state.selectedExceptions.has(id)) state.selectedExceptions.delete(id);
        else state.selectedExceptions.add(id);
        render();
      }
      if (action === "toggle-all-exceptions") {
        const route = currentRoute();
        const clientMatch = route.match(/clients\/(\d+)\/exceptions/);
        const clientId = clientMatch ? Number(clientMatch[1]) : null;
        const rows = data.exceptions.filter(e => (!clientId || e.clientId === clientId) && (state.exceptionFilter === "all" || e.status === state.exceptionFilter));
        const all = rows.length > 0 && rows.every(e => state.selectedExceptions.has(e.id));
        if (all) rows.forEach(e => state.selectedExceptions.delete(e.id));
        else rows.forEach(e => state.selectedExceptions.add(e.id));
        render();
      }
      if (action === "triage") {
        const status = target.dataset.status;
        data.exceptions.forEach(e => {
          if (state.selectedExceptions.has(e.id)) {
            e.status = status;
            if (state.triageNote) e.note = state.triageNote;
          }
        });
        state.selectedExceptions.clear();
        state.triageNote = "";
        toast("Exceptions updated");
        render();
      }
      if (action === "toggle-schema") {
        const table = target.dataset.table;
        if (state.schemaOpen.has(table)) state.schemaOpen.delete(table);
        else state.schemaOpen.add(table);
        render();
      }
      if (action === "insert-sql") {
        state.workbenchSql = state.workbenchSql.trimEnd() + " " + target.dataset.text;
        render();
      }
      if (action === "run-query") { state.workbenchRan = true; render(); }
      if (action === "suggest-run") { state.workbenchSql = target.dataset.sql; state.workbenchRan = true; render(); }
      if (action === "suggest-edit") { state.workbenchSql = target.dataset.sql; state.workbenchRan = false; render(); }
      if (action === "regenerate-digest") {
        state.digestGenerating = true;
        render();
        setTimeout(() => {
          state.digestGenerating = false;
          toast("Digest regenerated from the latest incidents, recons, and audit log");
          render();
        }, 1100);
      }
      if (action === "open-copilot") { state.copilotOpen = true; state.copilotFocus = true; state.openModal = null; render(); }
      if (action === "close-copilot") { state.copilotOpen = false; render(); }
      if (action === "copilot-send") sendCopilot();
      if (action === "copilot-ask") { state.openModal = null; sendCopilot(target.dataset.q); }
      if (action === "start-tour") { state.openModal = null; goToTourStop(0); }
      if (action === "tour-next") goToTourStop(state.tourStep + 1);
      if (action === "tour-back") goToTourStop(state.tourStep - 1);
      if (action === "tour-exit") { state.tourStep = null; toast("Tour ended - explore freely"); render(); }
      if (action === "start-demo") startDemo();
      if (action === "stop-demo") stopDemo();
      if (action === "toggle-theme") {
        state.theme = state.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = state.theme;
        try { localStorage.setItem("im-theme", state.theme); } catch {}
        render();
      }
    });

    document.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        state.openModal = state.openModal === "command" ? null : "command";
        render();
        return;
      }
      if (event.key === "Enter" && event.target?.dataset?.bind === "copilotInput") {
        sendCopilot();
        return;
      }
      if (event.key === "Escape") {
        if (state.openModal) { state.openModal = null; render(); }
        else if (state.copilotOpen) { state.copilotOpen = false; render(); }
        else if (state.tourStep != null) { state.tourStep = null; render(); }
      }
    });

    window.addEventListener("hashchange", () => {
      state.openModal = null;
      render();
    });

    render();
  </script>
</body>
</html>
