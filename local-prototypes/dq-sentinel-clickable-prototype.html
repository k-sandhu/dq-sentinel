<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DQ Sentinel Clickable Prototype</title>
  <style>
    :root {
      --brand: #509ee3;
      --brand-dark: #2f72ab;
      --brand-light: #cbe2f7;
      --bg: #f9fbfc;
      --card: #ffffff;
      --border: #e3e7e9;
      --border-light: #eef0f2;
      --text: #4c5773;
      --text-dark: #2e353b;
      --text-light: #949aab;
      --ok: #84bb4c;
      --warn: #f2a86f;
      --warn-strong: #e8a541;
      --danger: #ed6e6e;
      --danger-dark: #d14e4e;
      --purple: #a989c5;
      --shadow: 0 1px 3px rgba(46, 53, 59, 0.06), 0 2px 8px rgba(46, 53, 59, 0.04);
      --radius: 8px;
      --mono: ui-monospace, "Cascadia Code", "Segoe UI Mono", Menlo, monospace;
      --card2: #fbfcfd;
      --hover: #f5f9fd;
      --hover-soft: #f7fbff;
      --input-bg: #ffffff;
      --inverse-bg: #2e353b;
      --topbar-bg: rgba(249, 251, 252, 0.94);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --brand: #5ba3e8;
      --brand-dark: #84bdf0;
      --brand-light: #1f3a52;
      --bg: #14181d;
      --card: #1c2229;
      --card2: #181e24;
      --border: #2b333d;
      --border-light: #242b33;
      --text: #aeb8c4;
      --text-dark: #e9edf2;
      --text-light: #717c8a;
      --hover: #202a34;
      --hover-soft: #1e2832;
      --input-bg: #161b21;
      --inverse-bg: #0d1115;
      --topbar-bg: rgba(20, 24, 29, 0.92);
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    html[data-theme="dark"] .pill.pass, html[data-theme="dark"] .pill.resolved, html[data-theme="dark"] .pill.active, html[data-theme="dark"] .pill.complete, html[data-theme="dark"] .pill.approved { background: rgba(132, 187, 76, 0.16); color: #a3d573; }
    html[data-theme="dark"] .pill.warn, html[data-theme="dark"] .pill.acknowledged, html[data-theme="dark"] .pill.sev2 { background: rgba(242, 168, 111, 0.16); color: #ecb277; }
    html[data-theme="dark"] .pill.fail, html[data-theme="dark"] .pill.error, html[data-theme="dark"] .pill.open, html[data-theme="dark"] .pill.failed, html[data-theme="dark"] .pill.sev1 { background: rgba(237, 110, 110, 0.16); color: #f09090; }
    html[data-theme="dark"] .pill.expected, html[data-theme="dark"] .pill.running, html[data-theme="dark"] .pill.sev3, html[data-theme="dark"] .pill.monitoring { background: rgba(80, 158, 227, 0.18); color: #8ec3ee; }
    html[data-theme="dark"] .pill.proposed, html[data-theme="dark"] .pill.review { background: rgba(169, 137, 197, 0.2); color: #c5abdf; }
    html[data-theme="dark"] .pill.unknown, html[data-theme="dark"] .pill.muted, html[data-theme="dark"] .pill.disabled, html[data-theme="dark"] .pill.archived, html[data-theme="dark"] .pill.dismissed { background: rgba(255, 255, 255, 0.07); color: var(--text-light); }
    html[data-theme="dark"] .badge.ai { background: #2a2138; border-color: #473560; color: #c5abdf; }
    html[data-theme="dark"] .heat-cell.ok { background: rgba(132, 187, 76, 0.14); color: #a3d573; }
    html[data-theme="dark"] .heat-cell.warn { background: rgba(242, 168, 111, 0.14); color: #ecb277; }
    html[data-theme="dark"] .heat-cell.fail { background: rgba(237, 110, 110, 0.14); color: #f09090; }
    html[data-theme="dark"] .info-box { background: #152638; border-color: #234763; color: #8ec3ee; }
    html[data-theme="dark"] .error-box { background: #331c1c; border-color: #5a2e2e; color: #f09090; }
    html[data-theme="dark"] .map-node.fail { border-color: #5a2e2e; background: #241a1a; }
    html[data-theme="dark"] .map-node.warn { border-color: #5a4527; background: #241f17; }
    html[data-theme="dark"] .step.on { background: #1a2733; }
    html[data-theme="dark"] .step.done { border-color: #3a5230; background: #1c2418; color: #a3d573; }
    html[data-theme="dark"] .score-chip { background: rgba(237, 110, 110, 0.16); color: #f09090; }
    html[data-theme="dark"] .env-dot { box-shadow: 0 0 0 3px rgba(132, 187, 76, 0.15); }
    html[data-theme="dark"] .dense-item.clickable:hover { border-color: #2c4a66; }
    html[data-theme="dark"] .timeline-item.fail .timeline-dot { box-shadow: 0 0 0 1px #5a2e2e; }
    html[data-theme="dark"] .timeline-item.warn .timeline-dot { box-shadow: 0 0 0 1px #5a4527; }

    * { box-sizing: border-box; }
    html, body, #app { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", -apple-system, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1, h2, h3, h4 { color: var(--text-dark); margin: 0; font-weight: 700; }
    code, pre { font-family: var(--mono); font-size: 12.5px; }

    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 220px;
      flex: none;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 14px 10px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 10px 16px;
      font-size: 17px;
      font-weight: 800;
      color: var(--text-dark);
    }
    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--brand);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex: none;
    }
    .nav-section {
      margin-top: 14px;
      padding: 0 10px 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.7px;
      color: var(--text-light);
      text-transform: uppercase;
    }
    .nav-group { margin-top: 10px; }
    .nav-group:first-of-type { margin-top: 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--bg); text-decoration: none; }
    .nav-item.active { background: var(--brand); color: #fff; }
    .nav-item.active svg { stroke: #fff; }
    .nav-item svg { stroke: var(--text-light); flex: none; }
    .sidebar .spacer { flex: 1; }
    .user-box {
      border-top: 1px solid var(--border-light);
      padding: 10px 10px 2px;
      font-size: 12.5px;
    }
    .user-box .email {
      color: var(--text-dark);
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main { flex: 1; overflow-y: auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      height: 56px;
      background: var(--topbar-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 32px;
    }
    .environment-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-dark);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .env-dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--ok);
      box-shadow: 0 0 0 3px #eaf4df;
    }
    .global-search {
      flex: 1;
      max-width: 620px;
      position: relative;
    }
    .global-search input {
      margin-top: 0;
      padding-left: 34px;
      background: var(--input-bg);
    }
    .global-search svg {
      position: absolute;
      left: 10px;
      top: 8px;
      color: var(--text-light);
    }
    .topbar-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notification-dot {
      min-width: 18px;
      height: 18px;
      border-radius: 99px;
      background: var(--danger);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      padding: 0 5px;
    }
    .page { padding: 26px 32px 60px; max-width: 1280px; margin: 0 auto; }
    .page.wide { max-width: 1500px; }
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .page-header h1 { font-size: 22px; }
    .page-header .sub { color: var(--text-light); margin-top: 4px; font-size: 13px; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .card-pad { padding: 18px 20px; }
    .card h3 { font-size: 14px; margin-bottom: 12px; }
    .grid { display: grid; gap: 16px; }
    .grid > *, .split > * { min-width: 0; }
    .grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.cols-5 { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .grid.cols-6 { grid-template-columns: repeat(6, minmax(0, 1fr)); }
    @media (max-width: 1100px) {
      .grid.cols-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.cols-5, .grid.cols-6 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.cols-3, .grid.cols-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 820px) {
      .app { display: block; height: auto; min-height: 100%; overflow: visible; }
      .sidebar { width: 100%; position: sticky; top: 0; z-index: 20; border-bottom: 1px solid var(--border); border-right: 0; }
      .sidebar nav { display: flex; overflow-x: auto; gap: 3px; }
      .sidebar .spacer, .user-box, .nav-section { display: none; }
      .nav-item { white-space: nowrap; }
      .topbar { position: relative; height: auto; padding: 10px 14px; flex-wrap: wrap; }
      .global-search { order: 3; flex-basis: 100%; max-width: none; }
      .page { padding: 18px 14px 40px; }
    }

    .stat-card { padding: 16px 18px; }
    .stat-card .label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-dark);
      margin-top: 6px;
    }
    .stat-card .value.danger { color: var(--danger-dark); }
    .stat-card .value.ok { color: var(--ok); }
    .stat-card .hint { font-size: 12px; color: var(--text-light); margin-top: 2px; }
    .metric-row { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
    .metric-row .big {
      color: var(--text-dark);
      font-weight: 800;
      font-size: 24px;
      font-variant-numeric: tabular-nums;
    }
    .metric-row .delta { font-size: 12px; font-weight: 700; }
    .delta.good { color: var(--ok); }
    .delta.bad { color: var(--danger-dark); }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 22px 0 12px;
    }
    .section-title h2 {
      font-size: 16px;
      color: var(--text-dark);
    }
    .split {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
      gap: 16px;
      align-items: start;
    }
    .split.even { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    @media (max-width: 1050px) { .split, .split.even { grid-template-columns: 1fr; } }
    .dense-list { display: grid; gap: 8px; }
    .dense-item {
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 10px 12px;
      background: var(--card);
    }
    .dense-item.clickable { cursor: pointer; }
    .dense-item.clickable:hover { border-color: var(--brand-light); background: var(--hover-soft); }
    .dense-item .title { font-weight: 700; color: var(--text-dark); }
    .dense-item .meta { color: var(--text-light); font-size: 12px; margin-top: 2px; }
    .dense-item .meta, .domain-card .meta, .map-node .meta, .contract-item .meta { overflow-wrap: anywhere; }
    .heatmap {
      display: grid;
      grid-template-columns: 140px repeat(5, minmax(58px, 1fr));
      gap: 6px;
      align-items: stretch;
      font-size: 12px;
    }
    .heatmap .head {
      color: var(--text-light);
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 6px 4px;
    }
    .heatmap .row-label {
      color: var(--text-dark);
      font-weight: 700;
      padding: 8px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .heat-cell {
      border-radius: 5px;
      padding: 7px 8px;
      text-align: center;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      border: 1px solid transparent;
    }
    .heat-cell.ok { background: #eaf4df; color: #5d9230; }
    .heat-cell.warn { background: #fdf0e3; color: #c07f2b; }
    .heat-cell.fail { background: #fde9e9; color: #c4403f; }
    .heat-cell.neutral { background: var(--bg); color: var(--text-light); border-color: var(--border-light); }
    .timeline { display: grid; gap: 0; }
    .timeline-item {
      position: relative;
      padding: 0 0 14px 22px;
      border-left: 2px solid var(--border-light);
      margin-left: 6px;
    }
    .timeline-item:last-child { border-left-color: transparent; padding-bottom: 0; }
    .timeline-dot {
      position: absolute;
      left: -6px;
      top: 2px;
      width: 10px;
      height: 10px;
      border-radius: 99px;
      background: var(--brand);
      border: 2px solid var(--card);
      box-shadow: 0 0 0 1px var(--brand-light);
    }
    .timeline-item.fail .timeline-dot { background: var(--danger); box-shadow: 0 0 0 1px #f5c6c6; }
    .timeline-item.warn .timeline-dot { background: var(--warn-strong); box-shadow: 0 0 0 1px #f7d6ad; }
    .score-ring {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: conic-gradient(var(--ok) calc(var(--score) * 1%), var(--border-light) 0);
      position: relative;
      flex: none;
    }
    .score-ring::after {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 50%;
      background: var(--card);
    }
    .score-ring strong {
      position: relative;
      z-index: 1;
      color: var(--text-dark);
      font-size: 20px;
    }
    .domain-card {
      display: grid;
      gap: 10px;
      padding: 14px;
    }
    .domain-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .domain-title { color: var(--text-dark); font-weight: 800; }
    .progress-line {
      height: 7px;
      border-radius: 99px;
      background: var(--border-light);
      overflow: hidden;
    }
    .progress-line > div {
      height: 100%;
      border-radius: inherit;
      background: var(--brand);
    }
    .progress-line.fail > div { background: var(--danger); }
    .progress-line.warn > div { background: var(--warn-strong); }
    .quality-map {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .map-node {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--card);
      min-height: 78px;
    }
    .map-node .name { font-weight: 800; color: var(--text-dark); }
    .map-node .meta { color: var(--text-light); font-size: 11.5px; margin-top: 3px; }
    .map-node.fail { border-color: #f5c6c6; background: #fff8f8; }
    .map-node.warn { border-color: #f7d6ad; background: #fffaf4; }
    .stepper {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .step {
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 10px;
      background: var(--card);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
    }
    .step.on { border-color: var(--brand); color: var(--brand-dark); background: #f4f9fd; }
    .step.done { border-color: #cfe4bd; color: #5d9230; background: #f8fcf4; }
    .contract-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .contract-item {
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 12px;
      background: var(--card);
    }
    .contract-item strong { color: var(--text-dark); }
    .contract-item .label { color: var(--text-light); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4px; }
    @media (max-width: 820px) {
      .heatmap { grid-template-columns: 110px repeat(5, minmax(46px, 1fr)); overflow-x: auto; }
      .quality-map, .contract-grid { grid-template-columns: 1fr; }
      .stepper { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 520px) {
      .grid.cols-4, .grid.cols-5, .grid.cols-6 { grid-template-columns: 1fr; }
      .domain-head { align-items: flex-start; }
      .chart-bars, .panel-bars { overflow-x: auto; padding-bottom: 4px; }
      .day-bar { min-width: 28px; }
    }

    .table-wrap { overflow-x: auto; }
    table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.data th {
      text-align: left;
      padding: 10px 12px;
      color: var(--text-light);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      background: var(--card2);
    }
    table.data td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-light);
      vertical-align: middle;
    }
    table.data tr:last-child td { border-bottom: none; }
    table.data tr.clickable { cursor: pointer; }
    table.data tr.clickable:hover td { background: var(--hover); }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    td.mono, .mono { font-family: var(--mono); font-size: 12px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2.5px 9px;
      border-radius: 99px;
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
    }
    .pill.pass { background: #eaf4df; color: #5d9230; }
    .pill.warn { background: #fdf0e3; color: #c07f2b; }
    .pill.fail { background: #fde9e9; color: #c4403f; }
    .pill.error { background: #f7dcdc; color: #a33; }
    .pill.unknown, .pill.muted { background: #f0f2f4; color: var(--text-light); }
    .pill.open { background: #fde9e9; color: #c4403f; }
    .pill.acknowledged { background: #fdf0e3; color: #c07f2b; }
    .pill.expected { background: #e9f0fb; color: var(--brand-dark); }
    .pill.resolved { background: #eaf4df; color: #5d9230; }
    .pill.proposed { background: #f1eaf8; color: #7d5da3; }
    .pill.active { background: #eaf4df; color: #5d9230; }
    .pill.disabled, .pill.archived { background: #f0f2f4; color: var(--text-light); }
    .pill.running { background: #e9f0fb; color: var(--brand-dark); }
    .pill.complete { background: #eaf4df; color: #5d9230; }
    .pill.failed { background: #fde9e9; color: #c4403f; }
    .pill.sev1 { background: #fde9e9; color: #c4403f; }
    .pill.sev2 { background: #fdf0e3; color: #c07f2b; }
    .pill.sev3 { background: #e9f0fb; color: var(--brand-dark); }
    .pill.monitoring { background: #e9f0fb; color: var(--brand-dark); }
    .pill.review { background: #f1eaf8; color: #7d5da3; }
    .pill.approved { background: #eaf4df; color: #5d9230; }
    .pill.dismissed { background: #f0f2f4; color: var(--text-light); }
    .badge {
      display: inline-block;
      padding: 1.5px 7px;
      border-radius: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
    }
    .badge.ai { background: #f1eaf8; border-color: #e0d2ef; color: #7d5da3; }
    .badge.kind { font-family: var(--mono); font-size: 10.5px; }
    .sev {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 99px;
      margin-right: 6px;
    }

    function renderSearchResults() {
      const q = state.globalSearch.toLowerCase().trim();
      if (!q) return "";
      const datasetHits = data.datasets
        .filter(d => `${d.name} ${d.schema} ${d.owner} ${d.connection}`.toLowerCase().includes(q))
        .slice(0, 4)
        .map(d => ({ title: `${d.schema}.${d.name}`, meta: `${d.connection} - ${d.owner}`, route: `/datasets/${d.id}/profile`, kind: "dataset" }));
      const incidentHits = data.incidents
        .filter(i => `${i.id} ${i.title} ${i.owner} ${i.domain}`.toLowerCase().includes(q))
        .slice(0, 4)
        .map(i => ({ title: `${i.id} ${i.title}`, meta: `${i.status} - ${i.owner} - ${i.exceptions} exceptions`, route: `/incidents`, kind: "incident", id: i.id }));
      const checkHits = data.checks
        .filter(c => `${c.name} ${c.dataset} ${c.type}`.toLowerCase().includes(q))
        .slice(0, 4)
        .map(c => ({ title: c.name, meta: `${c.dataset} - ${c.status} - ${c.severity}`, route: `/datasets/${c.datasetId}/checks`, kind: "check" }));
      const hits = [...incidentHits, ...datasetHits, ...checkHits].slice(0, 8);
      return `<div class="page" style="padding-bottom:0">
        <div class="card card-pad" style="margin-bottom:0">
          <div class="section-title" style="margin:0 0 10px"><h2>Search results for "${escapeHtml(state.globalSearch)}"</h2><button class="small" data-action="clear-search">Clear</button></div>
          ${hits.length ? `<div class="dense-list">${hits.map(h => `<div class="dense-item clickable" data-route="${h.route}" ${h.id ? `data-incident-id="${h.id}"` : ""}><div class="title">${badge(h.kind)} ${escapeHtml(h.title)}</div><div class="meta">${escapeHtml(h.meta)}</div></div>`).join("")}</div>` : empty("No matching records", "Try a dataset name, owner, incident id, or check type.")}
        </div>
      </div>`;
    }

      rows.sort((a, b) => b.open - a.open);
      return appShell(`
        <div class="page">
          ${pageHeader("Datasets", `Tables and views under data-quality monitoring - ${rows.length} of ${data.datasets.length} shown`, `<button data-route="/connections">${icon("search", 13)} Browse sources</button>`)}

            <div class="chip-row">
              ${["all", "fail", "warn", "pass", "unknown"].map(f => `<button class="filter-chip ${state.datasetFilter === f ? "on" : ""}" data-action="dataset-filter" data-value="${f}">${f}</button>`).join("")}

    function datasetById(id) {
      return data.datasets.find(d => d.id === Number(id)) || data.datasets[0];

    function datasetHeader(dataset, tab) {
      const tabs = [
        ["profile", "Profile"], ["checks", "Checks"], ["runs", "Runs"], ["exceptions", "Exceptions"],
        ["dashboards", "Dashboards"], ["contract", "Contract"], ["lineage", "Lineage"], ["knowledge", "Knowledge"], ["rca", "Root cause"]
      ];
      return `
        ${pageHeader(
          `${dataset.schema}.${dataset.name} ${pill(dataset.health)}`,
          `${dataset.connection} - ${fmt(dataset.rows)} rows - profiled ${dataset.lastProfiled} - ${dataset.active} active checks - ${dataset.open} open exceptions`,
          `<button data-route="/workbench?dataset=${dataset.id}">${icon("search", 13)} Workbench</button><button data-action="profile-now">${icon("refresh", 14)} Profile now</button>`
        )}
        <div class="tabs">
          ${tabs.map(([key, label]) => `<button class="tab ${tab === key ? "on" : ""}" data-route="/datasets/${dataset.id}/${key}">${label}${key === "exceptions" ? `<span class="count">${dataset.open}</span>` : ""}</button>`).join("")}
        </div>`;
    }

    function renderDataset(id, tab = "profile") {
      const dataset = datasetById(id);
      let body = "";
      if (tab === "profile") body = renderProfileTab(dataset);
      if (tab === "checks") body = renderChecksTab(dataset);
      if (tab === "runs") body = `<div class="card">${runsTable(data.runs.filter(r => r.datasetId === dataset.id), false)}</div>`;
      if (tab === "exceptions") body = renderExceptionsTriage(dataset.id);
      if (tab === "dashboards") body = renderDashboardsTab(dataset);
      if (tab === "contract") body = renderContractTab(dataset);
      if (tab === "lineage") body = renderDatasetLineageTab(dataset);
      if (tab === "knowledge") body = renderKnowledgeTab();
      if (tab === "rca") body = renderRcaTab(dataset);
      return appShell(`<div class="page">${datasetHeader(dataset, tab)}${body}</div>`, "/datasets");
    }

    function renderProfileTab(dataset) {
      const facts = `<span class="badge">rows ${fmt(dataset.rows)}</span><span class="badge">stats from 10,000-row sample</span><span class="badge">pk order_id</span><span class="badge">freshness created_at</span>`;

          <div class="insight"><div class="t">Status drift detected <span class="risk-medium">(medium risk)</span></div><div style="font-size:12.5px">The value chargeback_pending appeared after the latest payments release.</div></div>

          ${data.columns.map(c => columnCard(c, dataset.rows)).join("")}

    function columnCard(col, rowCount) {
      const max = Math.max(...col.top.map(v => v[1]));
      return `<div class="card card-pad">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
          <h3 style="margin-bottom:2px">${col.name} ${col.patterns.map(p => badge(p, p === "pii" ? "ai" : "")).join(" ")}</h3>
          ${badge(col.dtype, "kind")}
        </div>
        <div style="display:flex;gap:18px;font-size:12.5px;margin:8px 0 10px;flex-wrap:wrap">
          <span><strong style="color:${col.nullPct > 0.05 ? "var(--danger-dark)" : "var(--text-dark)"}">${pct(col.nullPct, 2)}</strong> null</span>
          <span><strong>${fmt(col.distinct)}</strong> distinct</span>
          ${col.min !== undefined ? `<span><strong>${escapeHtml(col.min)}</strong> to <strong>${escapeHtml(col.max)}</strong></span>` : ""}
        </div>
        <div class="mini-bar" title="${pct(1 - col.nullPct, 2)} populated"><div style="width:${Math.max(2, (1 - col.nullPct) * 100)}%;background:${col.nullPct > 0.05 ? "var(--warn-strong)" : "var(--brand)"}"></div></div>
        <div style="margin-top:10px">
          ${col.top.slice(0, 5).map(([value, count]) => `<div class="top-value-row">
            <span class="val" title="${escapeHtml(value)}">${escapeHtml(value)}</span>
            <span class="bar mini-bar"><div style="width:${count / max * 100}%"></div></span>
            <span class="cnt">${pct(count / rowCount)}</span>
          </div>`).join("")}
        </div>
      </div>`;
    }
    function previewTable() {
      const rows = [
        [148102, 9301, "paid", -42.75, "guest@example.com", "2026-06-10 09:58:01"],
        [148101, 184, "delivered", 119.99, "redacted", "2026-06-10 09:56:13"],
        [148100, 1220, "chargeback_pending", 82.13, "redacted", "2026-06-10 09:55:21"],

      return `<div class="card table-wrap" style="margin-bottom:16px">

    function renderChecksTab(dataset) {

        <td style="font-size:12px;color:var(--text-light)">${c.schedule}</td>
        <td>${pill(c.status)}</td>
        <td>${c.last ? `${pill(c.last === "fail" ? "failed" : c.last === "warn" ? "warn" : "complete")} <span style="font-size:11.5px;color:var(--text-light)">18 min ago</span>` : `<span style="color:var(--text-light)">never ran</span>`}</td>

    function checkLabel(type) {

        regex: "Regex pattern",
        ml_outlier: "ML outlier",
        unique: "Unique",
        custom_sql: "Custom SQL"

    function schemaTree(table) {
      const open = state.schemaOpen.has(table);
      const cols = {
        orders: [["order_id", "integer"], ["customer_id", "integer"], ["status", "text"], ["total_amount", "real"], ["created_at", "timestamp"]],
        customers: [["customer_id", "integer"], ["email", "text"], ["country", "text"], ["created_at", "timestamp"]],
        payments: [["payment_id", "text"], ["order_id", "integer"], ["amount", "real"], ["captured_at", "timestamp"]]
      }[table];
      return `<div>
        <div class="schema-table" data-action="toggle-schema" data-table="${table}"><span>${open ? "v" : ">"} ${table}</span>${badge("table", "kind")}</div>
        ${open ? `<div class="schema-cols">${cols.map(([name, type]) => `<div class="schema-col" data-action="insert-sql" data-text="${name}"><span>${name}</span><span>${type}</span></div>`).join("")}</div>` : ""}
      </div>`;
    }

        { title: "Failures by source batch", rationale: "Groups failures by ingestion batch to isolate the spike.", sql: "SELECT ingestion_batch_id, COUNT(*) AS failures\nFROM orders\nWHERE total_amount < 0\nGROUP BY 1\nORDER BY failures DESC" },

    function render() {
      const route = currentRoute();
      const parts = route.split("?")[0].split("/").filter(Boolean);
      let html;
      if (route === "/") html = renderHome();
      else if (parts[0] === "connections" && parts[2] === "browse") html = renderBrowse(parts[1]);
      else if (parts[0] === "connections") html = renderConnections();
      else if (parts[0] === "incidents") html = renderIncidentsPage();
      else if (parts[0] === "datasets" && parts[1]) html = renderDataset(parts[1], parts[2] || "profile");
      else if (parts[0] === "datasets") html = renderDatasets();
      else if (parts[0] === "lineage") html = renderLineagePage();
      else if (parts[0] === "checks") html = renderChecksPage();
      else if (parts[0] === "runs") html = renderRunsPage();
      else if (parts[0] === "exceptions") html = renderExceptionsPage();
      else if (parts[0] === "workbench") html = renderWorkbench();
      else if (parts[0] === "ai-review") html = renderAiReviewPage();
      else if (parts[0] === "digest") html = renderDigest();
      else if (parts[0] === "governance") html = renderGovernancePage();
      else if (parts[0] === "settings") html = renderSettings();
      else html = renderHome();
      document.getElementById("app").innerHTML = html;
      bindInputs();
      const copilotBody = document.querySelector(".copilot-body");
      if (copilotBody) copilotBody.scrollTop = copilotBody.scrollHeight;
      if (state.copilotFocus) {
        state.copilotFocus = false;
        const input = document.querySelector('[data-bind="copilotInput"]');
        if (input) input.focus();
      }
    }

    function bindInputs() {
      document.querySelectorAll("[data-bind]").forEach(el => {
        const key = el.dataset.bind;
        const event = el.tagName === "SELECT" ? "change" : "input";
        el.addEventListener(event, () => {
          if (key === "workbenchLimit") state[key] = Number(el.value);
          else state[key] = el.value;
          if (["globalSearch", "datasetSearch", "browseFilter", "rcaQuestion"].includes(key)) {
            const pos = el.selectionStart;
            render();
            const next = document.querySelector(`[data-bind="${key}"]`);
            if (next) {
              next.focus();
              if (typeof next.setSelectionRange === "function") next.setSelectionRange(pos, pos);
            }
          }
        });
      });
      document.querySelectorAll("[data-knowledge]").forEach(el => {
        el.addEventListener("input", () => {
          data.knowledge[el.dataset.knowledge] = el.value;
        });
        el.addEventListener("change", () => {
          data.knowledge[el.dataset.knowledge] = el.value;
        });
      });
    }

    document.addEventListener("click", (event) => {
      const target = event.target.closest("[data-route], [data-action], [data-modal]");
      if (!target) return;
      if (target.dataset.route) {
        routeTo(target.dataset.route);
        state.openModal = null;
        return;
      }
      if (target.dataset.modal) {
        state.openModal = target.dataset.modal;
        state.modalData = { id: target.dataset.id };
        render();
        return;
      }
      const action = target.dataset.action;
      if (action === "toast") toast(target.dataset.message || "Clicked");
      if (action === "clear-search") { state.globalSearch = ""; render(); }
      if (action === "fleet") { state.fleetChecked = true; toast("Fleet health checked"); render(); }
      if (action === "close-modal" || action === "close-modal-bg") {
        if (action === "close-modal-bg" && event.target !== target) return;
        state.openModal = null; render();
      }
      if (action === "test-connection") {
        const result = document.getElementById("test-result");
        if (result) result.innerHTML = `<div class="info-box">Connected. Found 6 tables and 2 views.</div>`;
      }
      if (action === "save-connection") { state.openModal = null; toast("Connection saved"); render(); }
      if (action === "toggle-table") {
        event.stopPropagation();
        const key = target.dataset.key;
        if (!key) return;
        if (state.selectedTables.has(key)) state.selectedTables.delete(key);
        else state.selectedTables.add(key);
        render();
      }
      if (action === "register-tables") {
        const selected = Array.from(state.selectedTables);
        selected.forEach(key => {
          const [schema, name] = key.split(".");
          const table = data.tables.find(t => t.schema === schema && t.name === name);
          if (table && !table.registered) {
            const id = data.datasets.length + 1;
            table.registered = id;
            data.datasets.push({ id, name, schema, connection: "Shop database", connectionId: 1, health: "unknown", owner: "unassigned", importance: "medium", rows: table.rows, active: 0, open: 0, lastProfiled: "never" });
          }
        });
        state.selectedTables.clear();
        toast(`${selected.length} dataset${selected.length === 1 ? "" : "s"} registered`);
        routeTo("/datasets");
      }
      if (action === "dataset-filter") { state.datasetFilter = target.dataset.value; render(); }
      if (action === "incident-filter") { state.incidentFilter = target.dataset.value; render(); }
      if (action === "governance-tab") { state.governanceTab = target.dataset.value; render(); }
      if (action === "ai-filter") { state.aiQueueFilter = target.dataset.value; render(); }
      if (action === "profile-now") { toast("Profile refreshed from sample stats"); state.showPreview = true; render(); }
      if (action === "toggle-preview") { state.showPreview = !state.showPreview; render(); }
      if (action === "generate-checks") {
        const maxId = Math.max(...data.checks.map(c => c.id));
        if (!data.checks.some(c => c.name === "created_at is not in the future")) {
          data.checks.push({ id: maxId + 1, datasetId: 1, dataset: "orders", name: "created_at is not in the future", type: "custom_sql", column: "created_at", severity: "error", status: "proposed", origin: "llm", last: null, schedule: "every 60 min", rationale: "Future-dated orders distort daily volume and freshness reporting.", params: { expression: "created_at <= CURRENT_TIMESTAMP" } });
        }
        state.generatedBanner = "Generated 1 proposal via AI after exploring the data (2 duplicates skipped). Review and activate it below.";
        render();
      }
      if (action === "activate-check") {
        const c = data.checks.find(x => x.id === Number(target.dataset.id));
        if (c) c.status = "active";
        toast("Check activated");
        render();
      }
      if (action === "dismiss-check" || action === "archive-check") {
        const id = Number(target.dataset.id);
        const idx = data.checks.findIndex(x => x.id === id);
        if (idx >= 0) data.checks.splice(idx, 1);
        toast(action === "dismiss-check" ? "Proposal dismissed" : "Check archived");
        render();
      }
      if (action === "toggle-check") {
        const c = data.checks.find(x => x.id === Number(target.dataset.id));
        if (c) c.status = c.status === "active" ? "disabled" : "active";
        render();
      }
      if (action === "run-check") {
        const c = data.checks.find(x => x.id === Number(target.dataset.id));
        if (c) {
          c.last = c.type === "range" ? "fail" : "pass";
          data.runs.unshift({ id: Math.max(...data.runs.map(r => r.id)) + 1, datasetId: c.datasetId, dataset: c.dataset, checkId: c.id, check: c.name, status: c.last === "fail" ? "failed" : "complete", violations: c.last === "fail" ? 128 : 0, started: "just now", duration: 377, severity: c.severity });
          toast("Check run completed");
        }
        render();
      }
      if (action === "create-check") {
        data.checks.push({ id: Math.max(...data.checks.map(c => c.id)) + 1, datasetId: 1, dataset: "orders", name: "manual range check", type: "range", column: "total_amount", severity: "error", status: "active", origin: "manual", last: null, schedule: "every 60 min", rationale: "Created from prototype modal.", params: { min: 0 } });
        state.openModal = null; toast("Check created"); render();
      }
      if (action === "save-check") { state.openModal = null; toast("Check saved"); render(); }
      if (action === "incident-resolve") {
        const incident = data.incidents.find(i => i.id === target.dataset.id);
        if (incident) {
          incident.status = "monitoring";
          incident.progress = Math.max(incident.progress, 85);
        }
        state.openModal = null;
        toast("Incident moved to monitoring");
        render();
      }
      if (action === "create-incident") {
        data.incidents.unshift({ id: `DQ-${1043 + data.incidents.length}`, title: "Manual review: delayed customer segments", status: "active", severity: "sev2", owner: "growth-data", domain: "Customer", started: "just now", age: "0m", datasetId: 2, dataset: "customers", exceptions: 0, impact: "Lifecycle campaigns may use stale segment assignments", next: "Run freshness checks and inspect crm_segments lineage", progress: 10 });
        state.openModal = null;
        toast("Incident created");
        render();
      }
      if (action === "add-contract") {
        data.contracts.push({ datasetId: 1, field: "Order total non-negative", target: "total_amount >= 0", actual: "pending first evaluation", status: "warn" });
        state.openModal = null;
        toast("Contract assertion added");
        render();
      }
      if (action === "approve-ai") {
        const rec = data.recommendations.find(r => r.id === target.dataset.id);
        if (rec) {
          rec.status = "approved";
          data.checks.push({ id: Math.max(...data.checks.map(c => c.id)) + 1, datasetId: rec.datasetId, dataset: rec.dataset, name: rec.title, type: rec.type, column: null, severity: rec.severity, status: "proposed", origin: "llm", last: null, schedule: "every 60 min", rationale: rec.rationale, params: {} });
        }
        toast("Recommendation approved and staged as a proposed check");
        render();
      }
      if (action === "dismiss-ai") {
        const rec = data.recommendations.find(r => r.id === target.dataset.id);
        if (rec) rec.status = "dismissed";
        toast("Recommendation dismissed");
        render();
      }
      if (action === "exception-filter") { state.exceptionFilter = target.dataset.value; state.selectedExceptions.clear(); render(); }
      if (action === "toggle-exception") {
        event.stopPropagation();
        const id = Number(target.dataset.id);
        if (state.selectedExceptions.has(id)) state.selectedExceptions.delete(id);
        else state.selectedExceptions.add(id);
        render();
      }
      if (action === "toggle-all-exceptions") {
        const route = currentRoute();
        const datasetMatch = route.match(/datasets\/(\d+)\/exceptions/);
        const datasetId = datasetMatch ? Number(datasetMatch[1]) : null;
        const rows = data.exceptions.filter(e => (!datasetId || e.datasetId === datasetId) && (state.exceptionFilter === "all" || e.status === state.exceptionFilter));
        const all = rows.length > 0 && rows.every(e => state.selectedExceptions.has(e.id));
        if (all) rows.forEach(e => state.selectedExceptions.delete(e.id));
        else rows.forEach(e => state.selectedExceptions.add(e.id));
        render();
      }
      if (action === "triage") {
        const status = target.dataset.status;
        data.exceptions.forEach(e => {
          if (state.selectedExceptions.has(e.id)) {
            e.status = status;
            if (state.triageNote) e.note = state.triageNote;
          }
        });
        state.selectedExceptions.clear();
        state.triageNote = "";
        toast("Exceptions updated");
        render();
      }
      if (action === "select-dashboard") { state.selectedDashboardId = Number(target.dataset.id); render(); }
      if (action === "generate-dashboard") {
        const id = Math.max(...data.dashboards.map(d => d.id)) + 1;
        data.dashboards.unshift({ id, title: "Generated anomaly review", origin: "AI", focus: "negative totals", created: "just now" });
        state.selectedDashboardId = id;
        toast("Dashboard generated");
        render();
      }
      if (action === "save-knowledge") { state.savedKnowledge = true; toast("Knowledge saved"); render(); setTimeout(() => { state.savedKnowledge = false; render(); }, 2500); }
      if (action === "start-rca") {
        state.rcaRunning = true;
        render();
        setTimeout(() => {
          state.rcaRunning = false;
          data.rcaSessions.unshift({ id: Math.max(...data.rcaSessions.map(s => s.id)) + 1, datasetId: 1, status: "complete", runId: null, created: "just now", model: "claude-sonnet-4-5", question: state.rcaQuestion, summary: "The newest failures cluster in the payments_v2 batch and match refund adjustment records.", report: ["The agent found the spike starts in the 09:30 batch.", "All sampled failures have event_type = refund_adjustment.", "Filtering those rows before the order merge should clear the current exceptions."] });
          state.rcaQuestion = "";
          render();
        }, 1200);
      }
      if (action === "toggle-schema") {
        const table = target.dataset.table;
        if (state.schemaOpen.has(table)) state.schemaOpen.delete(table);
        else state.schemaOpen.add(table);
        render();
      }
      if (action === "insert-sql") {
        state.workbenchSql = state.workbenchSql.trimEnd() + " " + target.dataset.text;
        render();
      }
      if (action === "run-query") { state.workbenchRan = true; render(); }
      if (action === "suggest-run") { state.workbenchSql = target.dataset.sql; state.workbenchRan = true; render(); }
      if (action === "suggest-edit") { state.workbenchSql = target.dataset.sql; state.workbenchRan = false; render(); }
      if (action === "toggle-workbench-chart") { state.workbenchChart = !state.workbenchChart; render(); }
      if (action === "open-copilot") { state.copilotOpen = true; state.copilotFocus = true; state.openModal = null; render(); }
      if (action === "close-copilot") { state.copilotOpen = false; render(); }
      if (action === "copilot-send") sendCopilot();
      if (action === "copilot-ask") { state.openModal = null; sendCopilot(target.dataset.q); }
      if (action === "start-tour") { state.openModal = null; goToTourStop(0); }
      if (action === "tour-next") goToTourStop(state.tourStep + 1);
      if (action === "tour-back") goToTourStop(state.tourStep - 1);
      if (action === "tour-exit") { state.tourStep = null; toast("Tour ended - explore freely"); render(); }
      if (action === "start-demo") startDemo();
      if (action === "stop-demo") stopDemo();
      if (action === "toggle-theme") {
        state.theme = state.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = state.theme;
        try { localStorage.setItem("dq-theme", state.theme); } catch {}
        render();
      }
      if (action === "regenerate-digest") {
        state.digestGenerating = true;
        render();
        setTimeout(() => {
          state.digestGenerating = false;
          toast("Digest regenerated from the latest incidents, runs, and audit log");
          render();
        }, 1100);
      }
    });

    document.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
        event.preventDefault();
        state.openModal = state.openModal === "command" ? null : "command";
        render();
        return;
      }
      if (event.key === "Enter" && event.target?.dataset?.bind === "copilotInput") {
        sendCopilot();
        return;
      }
      if (event.key === "Escape") {
        if (state.openModal) { state.openModal = null; render(); }
        else if (state.copilotOpen) { state.copilotOpen = false; render(); }
        else if (state.tourStep != null) { state.tourStep = null; render(); }
      }
    });

    window.addEventListener("hashchange", () => {
      state.openModal = null;
      render();
    });

    render();
  </script>
</body>
</html>
