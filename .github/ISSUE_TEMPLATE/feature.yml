name: Feature request
description: Propose an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The situation or workflow that's painful today — not yet the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Sketches, examples, and links to prior art welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, or how you work around it today.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend (API, checks, scheduler)
        - Frontend / UX
        - LLM / agents
        - ML (outlier detection)
        - Connectors / dialects
        - Infra / deployment / observability
        - Docs
        - Not sure
